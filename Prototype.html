<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keybroker — Control Plane</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-ink: #0b0c0f;
    --bg-paper: #12141a;
    --bg-surface: #1a1d26;
    --bg-elevated: #222635;
    --border-subtle: #2a2e3b;
    --border-focus: #3d4252;
    --text-primary: #e8e9ec;
    --text-secondary: #9aa0b2;
    --text-muted: #5c6270;
    --accent-lime: #c8f560;
    --accent-lime-dim: #9bbf3d;
    --accent-amber: #f5c860;
    --accent-cyan: #60d6f5;
    --accent-rose: #f5608a;
    --accent: var(--accent-lime);
    --danger: #e14e4e;
    --success: #60f58a;
    --warning: #f5c860;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", Monaco, "Cascadia Code", monospace;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--font-sans); background: var(--bg-ink); color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

  /* Utility classes generated via inline styles mostly, but some helpers here */
  .mono { font-family: var(--font-mono); }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform: translateY(0);} }
  @keyframes slideInRight { from { transform: translateX(100%);} to { transform: translateX(0);} }
  @keyframes pulse { 0%,100%{ opacity:1;} 50%{ opacity:.5;} }
  .anim-fade { animation: fadeIn .25s ease-out both; }
  .anim-slide { animation: slideInRight .25s ease-out both; }

  /* Tweaks overrides applied via JS to a style tag */
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ================================================================
   DATA & UTILITIES
   ================================================================ */

const PINNED_NOW = new Date("2026-05-10T15:42:00-07:00").getTime();
const HOUR = 3600000;
const DAY = 86400000;

const PROVIDERS = ["openai","anthropic","google","groq","mistral","echo"];
const MODELS = ["gpt-4o","gpt-4o-mini","claude-sonnet-4","claude-haiku-4","gemini-3-pro","gemini-3-flash","mixtral-large"];
const SCOPES = ["chat.completions","embeddings","images","audio","batch"];
const TEAMS = ["platform","ml","growth","security","infra"];
const PROJECTS = ["chat-widget","ci-runner","data-pipeline","shadow-ai","experiment-7"];
const ENVS = ["prod","staging","dev","local"];

const fmtDate = (ts) => new Date(ts).toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit", timeZone:"America/Los_Angeles" });
const fmtUsd = (n) => "$" + n.toFixed(2);
const fmtK = (n) => n >= 1000 ? (n/1000).toFixed(1) + "k" : String(n);
const uid = () => Math.random().toString(36).slice(2,10);
const pick = (a) => a[Math.floor(Math.random()*a.length)];
const rand = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
const clamp = (n,min,max) => Math.max(min,Math.min(max,n));

function hashString(str) {
  let h = 0;
  for (let i=0;i<str.length;i++) h = (h<<5)-h+str.charCodeAt(i);
  return Math.abs(h);
}

/* ---------------- Seed data generators ---------------- */

function makeToken(overrides={}) {
  const label = overrides.label || `${pick(["ci","deploy","svc","exp"])}-${pick(["runner","api","bot","worker"])}-${rand(1,99)}`;
  const provider = overrides.provider || pick(PROVIDERS);
  const calls = overrides.calls ?? rand(20,4000);
  const costPerCall = provider==="echo" ? 0 : rand(5,80)/1000;
  const spend = +(calls * costPerCall).toFixed(2);
  const cap = overrides.capUsd ?? (spend * rand(12,40)/10);
  return {
    id: overrides.id || uid(),
    label,
    provider,
    scope: overrides.scope || pick(SCOPES),
    model: overrides.model || pick(MODELS),
    machine: overrides.machine || `host-${pick(["alpha","beta","gamma","delta"])}-${rand(1,9)}.local`,
    tags: overrides.tags || { team: pick(TEAMS), project: pick(PROJECTS), env: pick(ENVS) },
    createdAt: overrides.createdAt || (PINNED_NOW - rand(1,30)*DAY - rand(0,23)*HOUR),
    expiresAt: overrides.expiresAt || (PINNED_NOW + rand(7,90)*DAY),
    revoked: overrides.revoked ?? false,
    revokedAt: overrides.revokedAt || undefined,
    capUsd: +cap.toFixed(2),
    spendUsd: +spend.toFixed(2),
    calls,
    lastUsed: overrides.lastUsed || (PINNED_NOW - rand(0,48)*HOUR),
    ...overrides,
  };
}

function makeAuditForToken(token, count=10) {
  const entries = [];
  for (let i=0;i<count;i++) {
    const ts = token.lastUsed - i*rand(1,8)*HOUR;
    if (ts < token.createdAt) break;
    const isOk = Math.random() > 0.08;
    entries.push({
      id: uid(),
      tokenId: token.id,
      tokenLabel: token.label,
      timestamp: ts,
      provider: token.provider,
      model: isOk ? token.model : pick(MODELS),
      status: isOk ? "ok" : pick(["denied","model_forbidden","provider_forbidden","scope_denied","cap_exceeded"]),
      cost: isOk ? +(rand(5,80)/1000).toFixed(4) : 0,
      durationMs: rand(120,2800),
      tags: token.tags,
      requestedModel: isOk ? undefined : pick(MODELS),
    });
  }
  return entries;
}

function seedData(persona) {
  const counts = persona==="sre" ? {tokens:18, auditPer:12} : persona==="security" ? {tokens:24, auditPer:8} : {tokens:14, auditPer:10};
  const tokens = [];
  const audit = [];
  // baseline tokens
  for (let i=0;i<counts.tokens;i++) {
    const t = makeToken();
    tokens.push(t);
    audit.push(...makeAuditForToken(t, counts.auditPer));
  }
  // persona-specific highlights
  if (persona==="finops") {
    tokens.push(makeToken({ label:"ci-runner-04", provider:"openai", tags:{team:"platform",project:"ci-runner",env:"prod"}, capUsd:120, spendUsd:98.40, calls:8200 }));
  }
  if (persona==="security") {
    tokens.push(makeToken({ label:"contractor-jdoe", provider:"anthropic", tags:{team:"growth",project:"chat-widget",env:"prod"}, calls:3, spendUsd:0.04, lastUsed: PINNED_NOW - 14*HOUR }));
  }
  // PII / secret scanner simulation — one synthetic egress block
  const piiToken = makeToken({ label:"svc-leaky-01", provider:"openai", tags:{team:"growth",project:"chat-widget",env:"staging"}, calls:1, spendUsd:0, lastUsed: PINNED_NOW - 3*HOUR });
  tokens.push(piiToken);
  audit.unshift({
    id: "pii-"+uid(), tokenId: piiToken.id, tokenLabel: piiToken.label,
    timestamp: PINNED_NOW - 3*HOUR, provider: "openai", model: "gpt-4o",
    status: "egress_blocked", cost: 0, durationMs: 0,
    tags: piiToken.tags,
    requestedModel: undefined
  });
  tokens.sort((a,b)=>b.createdAt-a.createdAt);
  audit.sort((a,b)=>b.timestamp-a.timestamp);
  return { tokens, audit, policy:{ forbiddenModels:["gemini-3-pro-preview"], allowedProviders:["openai","anthropic","google","groq"] } };
}

/* ---------------- Persistence ---------------- */

const STORAGE_KEY = "keybroker-prototype-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return null;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

/* ---------------- Reducer-like helpers ---------------- */

function deriveSpendByTag(tokens, audit) {
  const byTeam = {}; const byProject = {}; const byEnv = {};
  for (const a of audit) {
    if (a.status !== "ok") continue;
    if (a.tags?.team) byTeam[a.tags.team] = (byTeam[a.tags.team]||0) + a.cost;
    if (a.tags?.project) byProject[a.tags.project] = (byProject[a.tags.project]||0) + a.cost;
    if (a.tags?.env) byEnv[a.tags.env] = (byEnv[a.tags.env]||0) + a.cost;
  }
  // also include tokens with zero spend
  for (const t of tokens) {
    if (t.tags?.team && !(t.tags.team in byTeam)) byTeam[t.tags.team] = 0;
    if (t.tags?.project && !(t.tags.project in byProject)) byProject[t.tags.project] = 0;
    if (t.tags?.env && !(t.tags.env in byEnv)) byEnv[t.tags.env] = 0;
  }
  const sort = (o) => Object.entries(o).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({name:k,value:+v.toFixed(2)}));
  return { team: sort(byTeam), project: sort(byProject), env: sort(byEnv) };
}

function forecastCapHit(token) {
  if (!token || token.revoked || token.spendUsd <= 0) return null;
  const ageDays = (PINNED_NOW - token.createdAt) / DAY;
  const daily = token.spendUsd / Math.max(ageDays, 0.1);
  const remaining = token.capUsd - token.spendUsd;
  const daysLeft = remaining / Math.max(daily, 0.01);
  const hitDate = new Date(PINNED_NOW + daysLeft*DAY);
  return { daysLeft: Math.floor(daysLeft), hitDate, daily: +daily.toFixed(2) };
}

/* ================================================================
   DESIGN TOKENS & SHARED COMPONENTS
   ================================================================ */

function useAccent() {
  const [accent, setAccent] = useState("lime");
  useEffect(()=>{
    const map = { lime:"#c8f560", amber:"#f5c860", cyan:"#60d6f5", rose:"#f5608a" };
    document.documentElement.style.setProperty("--accent", map[accent]||map.lime);
  },[accent]);
  return [accent, setAccent];
}

const Icon = ({ name, size=16 }) => {
  const s = { width:size, height:size, display:"inline-block", verticalAlign:"middle" };
  const paths = {
    home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>,
    key: <circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.5 9.5"/><path d="M15.5 7.5l3 3L22 7l-3-3z"/>,
    fileText: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>,
    shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
    eye: <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>,
    settings: <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 5 15.4a1.65 1.65 0 0 0-1.51 1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>,
    alertTriangle: <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>,
    plus: <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>,
    x: <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>,
    search: <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>,
    chevronRight: <polyline points="9 18 15 12 9 6"/>,
    rotateCcw: <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>,
    zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
    tag: <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>,
    barChart: <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>,
    activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
    user: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>,
    cpu: <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>,
    trash: <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>,
    check: <polyline points="20 6 9 17 4 12"/>,
    clock: <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>,
    lock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>,
    unlock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
  };
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={s}>{paths[name] || null}</svg>;
};

const Badge = ({ children, color="default", small=false }) => {
  const map = {
    default: { bg:"var(--bg-elevated)", color:"var(--text-secondary)" },
    lime: { bg:"rgba(200,245,96,0.12)", color:"var(--accent-lime)" },
    amber: { bg:"rgba(245,200,96,0.12)", color:"var(--accent-amber)" },
    cyan: { bg:"rgba(96,214,245,0.12)", color:"var(--accent-cyan)" },
    rose: { bg:"rgba(245,96,138,0.12)", color:"var(--accent-rose)" },
    danger: { bg:"rgba(225,78,78,0.12)", color:"var(--danger)" },
    success: { bg:"rgba(96,245,138,0.12)", color:"var(--success)" },
  };
  const c = map[color]||map.default;
  return <span style={{ display:"inline-flex", alignItems:"center", gap:4, fontSize:small?11:12, fontWeight:600, letterSpacing:"0.02em", textTransform:"uppercase", padding: small?"2px 6px":"3px 8px", borderRadius:999, background:c.bg, color:c.color, fontFamily:"var(--font-mono)" }}>{children}</span>;
};

const TagPill = ({ label, value }) => (
  <span style={{ display:"inline-flex", alignItems:"center", gap:4, fontSize:11, padding:"2px 7px", borderRadius:999, background:"var(--bg-elevated)", color:"var(--text-secondary)", border:"1px solid var(--border-subtle)" }}>
    <span style={{ color:"var(--text-muted)", fontWeight:500 }}>{label}</span>
    <span style={{ color:"var(--text-primary)", fontWeight:600 }}>{value}</span>
  </span>
);

const Card = ({ children, style={}, onClick, className="" }) => (
  <div onClick={onClick} className={className} style={{ background:"var(--bg-surface)", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius)", padding:20, ...style }}>
    {children}
  </div>
);

const Button = ({ children, onClick, variant="primary", disabled=false, icon, style={} }) => {
  const isPrimary = variant==="primary";
  const isDanger = variant==="danger";
  const isGhost = variant==="ghost";
  const base = { display:"inline-flex", alignItems:"center", gap:8, padding:"8px 14px", borderRadius:"var(--radius-sm)", fontSize:13, fontWeight:600, cursor: disabled?"not-allowed":"pointer", opacity: disabled?0.5:1, border:"1px solid transparent", transition:"all .15s", fontFamily:"inherit" };
  const looks = isPrimary ? { background:"var(--accent)", color:"var(--bg-ink)", borderColor:"var(--accent)" }
    : isDanger ? { background:"rgba(225,78,78,0.12)", color:"var(--danger)", borderColor:"rgba(225,78,78,0.25)" }
    : isGhost ? { background:"transparent", color:"var(--text-secondary)", borderColor:"var(--border-subtle)" }
    : { background:"var(--bg-elevated)", color:"var(--text-primary)", borderColor:"var(--border-subtle)" };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...looks, ...style }} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.filter="brightness(1.1)"}} onMouseLeave={e=>e.currentTarget.style.filter="none"}>{icon}{children}</button>;
};

const Modal = ({ title, children, onClose, footer }) => (
  <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
    <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)", backdropFilter:"blur(4px)" }} onClick={onClose}/>
    <div className="anim-fade" style={{ position:"relative", background:"var(--bg-paper)", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius)", width:"min(640px, 92vw)", maxHeight:"85vh", overflow:"auto", boxShadow:"var(--shadow)" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 20px", borderBottom:"1px solid var(--border-subtle)" }}>
        <h3 style={{ margin:0, fontSize:16, fontWeight:700 }}>{title}</h3>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"var(--text-muted)", cursor:"pointer" }}><Icon name="x" size={18}/></button>
      </div>
      <div style={{ padding:20 }}>{children}</div>
      {footer && <div style={{ display:"flex", gap:8, justifyContent:"flex-end", padding:"12px 20px", borderTop:"1px solid var(--border-subtle)" }}>{footer}</div>}
    </div>
  </div>
);

const Progress = ({ value, max, color="var(--accent)" }) => {
  const pct = clamp((value/max)*100,0,100);
  return (
    <div style={{ height:6, background:"var(--bg-elevated)", borderRadius:999, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:999, transition:"width .6s ease" }}/>
    </div>
  );
};

/* ================================================================
   TWEEKS PANEL
   ================================================================ */

function TweaksPanel({ open, onClose, tweaks, setTweaks, onReseed }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:90, pointerEvents:"none" }}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.4)", pointerEvents:"auto" }} onClick={onClose}/>
      <div className="anim-slide" style={{ position:"absolute", right:0, top:0, bottom:0, width:320, background:"var(--bg-paper)", borderLeft:"1px solid var(--border-subtle)", pointerEvents:"auto", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 20px", borderBottom:"1px solid var(--border-subtle)" }}>
          <h3 style={{ margin:0, fontSize:15, fontWeight:700 }}>Tweaks</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"var(--text-muted)", cursor:"pointer" }}><Icon name="x" size={18}/></button>
        </div>
        <div style={{ padding:20, display:"flex", flexDirection:"column", gap:24, overflow:"auto", flex:1 }}>
          <Field label="Persona">
            <select value={tweaks.persona} onChange={e=>{ setTweaks({...tweaks, persona:e.target.value}); onReseed(e.target.value); }} style={inputStyle}>
              <option value="sre">SRE — fleet health</option>
              <option value="security">Security — breach hunter</option>
              <option value="finops">FinOps — cost attribution</option>
            </select>
          </Field>
          <Field label="Scenario">
            <select value={tweaks.scenario} onChange={e=>setTweaks({...tweaks, scenario:e.target.value})} style={inputStyle}>
              <option value="healthy">Healthy</option>
              <option value="breach">Breach (anomaly)</option>
              <option value="overspend">Overspend (cap warning)</option>
            </select>
          </Field>
          <Field label="Accent">
            <div style={{ display:"flex", gap:8 }}>
              {["lime","amber","cyan","rose"].map(a=> (
                <button key={a} onClick={()=>setTweaks({...tweaks, accent:a})} style={{ width:28, height:28, borderRadius:999, border:tweaks.accent===a?"2px solid var(--text-primary)":"2px solid transparent", background:`var(--accent-${a})`, cursor:"pointer" }}/>
              ))}
            </div>
          </Field>
          <Field label="Density">
            <select value={tweaks.density} onChange={e=>setTweaks({...tweaks, density:e.target.value})} style={inputStyle}>
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </Field>
          <div style={{ padding:12, background:"var(--bg-surface)", borderRadius:"var(--radius-sm)", border:"1px dashed var(--border-subtle)", fontSize:12, color:"var(--text-muted)", lineHeight:1.5 }}>
            <strong style={{ color:"var(--text-secondary)", display:"block", marginBottom:4 }}>Now pinned</strong>
            {fmtDate(PINNED_NOW)} PT<br/>
            Timestamps are relative to this moment.

function TagSpendCard({ title, data, total }) {

function TokensScreen({ tokens, setTokens, audit, setAudit }) {
  const [filter, setFilter] = useState("");
  const [tagFilter, setTagFilter] = useState({ team:"", project:"", env:"" });
  const [statusFilter, setStatusFilter] = useState("all");
  const [selected, setSelected] = useState(null);
  const [issueOpen, setIssueOpen] = useState(false);
  const [rotateOpen, setRotateOpen] = useState(false);
  const [recoverOpen, setRecoverOpen] = useState(false);

  const filtered = useMemo(()=> {
    return tokens.filter(t=>{
      const q = filter.toLowerCase();
      const matches = !q || t.label.toLowerCase().includes(q) || t.provider.includes(q) || t.machine.toLowerCase().includes(q);
      const matchesStatus = statusFilter==="all" ? true : statusFilter==="active" ? !t.revoked : t.revoked;
      const matchesTeam = !tagFilter.team || t.tags?.team===tagFilter.team;
      const matchesProj = !tagFilter.project || t.tags?.project===tagFilter.project;
      const matchesEnv = !tagFilter.env || t.tags?.env===tagFilter.env;
      return matches && matchesStatus && matchesTeam && matchesProj && matchesEnv;
    });
  }, [tokens, filter, tagFilter, statusFilter]);

  const allTeams = useMemo(()=>[...new Set(tokens.map(t=>t.tags?.team).filter(Boolean))], [tokens]);
  const allProjects = useMemo(()=>[...new Set(tokens.map(t=>t.tags?.project).filter(Boolean))], [tokens]);
  const allEnvs = useMemo(()=>[...new Set(tokens.map(t=>t.tags?.env).filter(Boolean))], [tokens]);

  const revoke = (id) => {
    setTokens(prev=>prev.map(t=>t.id===id?{...t, revoked:true, revokedAt:PINNED_NOW}:t));
    setSelected(null);
  };

  const rotateAll = () => {
    setTokens(prev=>prev.map(t=>!t.revoked?{...t, revoked:true, revokedAt:PINNED_NOW}:t));
    setRotateOpen(false);
    setRecoverOpen(true);
    setSelected(null);
  };

  const activeCount = tokens.filter(t=>!t.revoked).length;
  const machines = [...new Set(tokens.filter(t=>!t.revoked).map(t=>t.machine))];

  return (
    <div className="anim-fade" style={{ padding:24, maxWidth:1200, margin:"0 auto", display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>

          <h1 style={{ margin:0, fontSize:22, fontWeight:800 }}>Tokens</h1>
          <p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:13 }}>{activeCount} active · {tokens.length - activeCount} revoked</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Button variant="danger" icon={<Icon name="zap" size={14}/>} onClick={()=>setRotateOpen(true)}>Rotate all</Button>
          <Button variant="primary" icon={<Icon name="plus" size={14}/>} onClick={()=>setIssueOpen(true)}>Issue token</Button>
        </div>
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--text-muted)", pointerEvents:"none" }}><Icon name="search" size={14}/></span>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Search tokens…" style={{ ...inputStyle, width:"100%", paddingLeft:32 }}/>
        </div>
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={inputStyle}>
          <option value="all">All statuses</option>
          <option value="active">Active</option>
          <option value="revoked">Revoked</option>
        </select>
        <select value={tagFilter.team} onChange={e=>setTagFilter({...tagFilter, team:e.target.value})} style={inputStyle}>
          <option value="">All teams</option>
          {allTeams.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <select value={tagFilter.project} onChange={e=>setTagFilter({...tagFilter, project:e.target.value})} style={inputStyle}>
          <option value="">All projects</option>
          {allProjects.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <select value={tagFilter.env} onChange={e=>setTagFilter({...tagFilter, env:e.target.value})} style={inputStyle}>
          <option value="">All envs</option>
          {allEnvs.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>

      {/* Table */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:"1px solid var(--border-subtle)", textAlign:"left", fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", color:"var(--text-muted)" }}>
              <th style={{ padding:"10px 16px" }}>Label</th>
              <th style={{ padding:"10px 16px" }}>Tags</th>
              <th style={{ padding:"10px 16px" }}>Provider</th>
              <th style={{ padding:"10px 16px" }}>Machine</th>
              <th style={{ padding:"10px 16px" }}>Spend</th>
              <th style={{ padding:"10px 16px" }}>Status</th>
              <th style={{ padding:"10px 16px" }}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(t=> (
              <tr key={t.id} onClick={()=>setSelected(t)} style={{ borderBottom:"1px solid var(--border-subtle)", cursor:"pointer", transition:"background .15s" }} onMouseEnter={e=>e.currentTarget.style.background="var(--bg-elevated)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

                  <div className="mono" style={{ fontSize:11, color:"var(--text-muted)" }}>{t.scope}</div>
                </td>
                <td style={{ padding:"10px 16px" }}>
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                    {t.tags?.team && <TagPill label="team" value={t.tags.team}/>}
                    {t.tags?.project && <TagPill label="project" value={t.tags.project}/>}

                <td style={{ padding:"10px 16px" }}>

                  <div style={{ fontSize:10, color:"var(--text-muted)" }}>of {fmtUsd(t.capUsd)}</div>
                </td>
                <td style={{ padding:"10px 16px" }}>
                  {t.revoked ? <Badge color="danger" small>Revoked</Badge> : <Badge color="lime" small>Active</Badge>}

      </Card>

      {issueOpen && <IssueModal onClose={()=>setIssueOpen(false)} onIssue={(t)=>{ setTokens(prev=>[t,...prev]); setAudit(prev=>[...makeAuditForToken(t,6),...prev]); setIssueOpen(false); }}/>}

      {selected && <TokenDetail token={selected} onClose={()=>setSelected(null)} onRevoke={()=>revoke(selected.id)} audit={audit.filter(a=>a.tokenId===selected.id).slice(0,8)}/>}

      {rotateOpen && (
        <Modal title="Fire Drill — Rotate All Tokens" onClose={()=>setRotateOpen(false)} footer={[
          <Button key="cancel" variant="ghost" onClick={()=>setRotateOpen(false)}>Cancel</Button>,
          <Button key="confirm" variant="danger" onClick={rotateAll}>Revoke {activeCount} tokens</Button>
        ]}>
          <p style={{ margin:"0 0 12px", fontSize:14, lineHeight:1.5 }}>
            This will immediately revoke <strong>{activeCount} active tokens</strong> across <strong>{machines.length} machines</strong>.
          </p>
          <div style={{ display:"flex", flexDirection:"column", gap:8, background:"var(--bg-surface)", padding:12, borderRadius:"var(--radius-sm)", border:"1px solid var(--border-subtle)", marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:13 }}>
              <span style={{ color:"var(--text-muted)" }}>CI jobs that may fail</span>
              <span style={{ color:"var(--danger)", fontWeight:700 }}>{Math.floor(activeCount*0.25)}</span>

              <span style={{ color:"var(--text-muted)" }}>Estimated recovery time</span>

function RecoveryModal({ tokens, setTokens, audit, setAudit, onClose }) {
  const revoked = tokens.filter(t=>t.revoked && t.revokedAt===PINNED_NOW);
  const [selectedIds, setSelectedIds] = useState(new Set(revoked.map(t=>t.id)));

  const toggle = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };

  const toggleAll = () => {
    if (selectedIds.size === revoked.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(revoked.map(t=>t.id)));
  };

  const reissue = () => {
    const toReissue = revoked.filter(t=>selectedIds.has(t.id));
    const newTokens = [];
    const newAudit = [];
    for (const t of toReissue) {
      const nt = makeToken({ label:t.label, provider:t.provider, scope:t.scope, model:t.model, machine:t.machine, tags:t.tags, capUsd:t.capUsd, createdAt:PINNED_NOW, expiresAt:PINNED_NOW+30*DAY, spendUsd:0, calls:0, lastUsed:PINNED_NOW });
      newTokens.push(nt);
      newAudit.push(...makeAuditForToken(nt, 3));
    }
    setTokens(prev=>[...newTokens, ...prev]);
    setAudit(prev=>[...newAudit, ...prev]);
    onClose();
  };

  const byTeam = {};
  for (const t of revoked) {
    const key = t.tags?.team || "untagged";
    (byTeam[key] = byTeam[key]||[]).push(t);
  }

  return (
    <Modal title="Recovery — Batch Re-issue" onClose={onClose} footer={[
      <Button key="c" variant="ghost" onClick={onClose}>Close</Button>,
      <Button key="r" variant="primary" onClick={reissue} disabled={selectedIds.size===0} icon={<Icon name="rotateCcw" size={14}/>}>Re-issue {selectedIds.size} tokens</Button>
    ]}>
      <p style={{ margin:"0 0 12px", fontSize:14, lineHeight:1.5 }}>
        {revoked.length} tokens were just revoked. Select which ones to re-issue immediately.
      </p>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--text-secondary)", cursor:"pointer" }}>
          <input type="checkbox" checked={selectedIds.size===revoked.length && revoked.length>0} onChange={toggleAll}/>
          Select all
        </label>
      </div>
      <div style={{ maxHeight:360, overflow:"auto", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius-sm)" }}>
        {Object.entries(byTeam).map(([team, list])=> (
          <div key={team} style={{ borderBottom:"1px solid var(--border-subtle)" }}>

function StatusBadge({ status }) {
  const map = {
    ok: { color:"lime", label:"ok" },
    denied: { color:"danger", label:"denied" },
    model_forbidden: { color:"danger", label:"model_forbidden" },
    provider_forbidden: { color:"danger", label:"provider_forbidden" },
    scope_denied: { color:"amber", label:"scope_denied" },
    cap_exceeded: { color:"rose", label:"cap_exceeded" },
    egress_blocked: { color:"rose", label:"egress_blocked" },
  };
  const s = map[status] || map.denied;
  return <Badge color={s.color} small>{s.label}</Badge>;
}

function CodeBlock({ code, lang="json" }) {
  if (lang==="json" && (code.trim().startsWith("{") || code.trim().startsWith("["))) {
    try {
      const pretty = JSON.stringify(JSON.parse(code), null, 2);
      const highlighted = pretty.replace(/(".*?"):\s*/g, '<span style="color:var(--accent-cyan)">$1</span>: ')
        .replace(/: (".*?")/g, ': <span style="color:var(--accent-lime)">$1</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span style="color:var(--accent-amber)">$1</span>')
        .replace(/\b(true|false)\b/g, '<span style="color:var(--accent-rose)">$1</span>')
        .replace(/\b(null)\b/g, '<span style="color:var(--text-muted)">$1</span>');
      return <pre className="mono" style={{ margin:0, fontSize:12, lineHeight:1.6, overflow:"auto", whiteSpace:"pre-wrap", wordBreak:"break-word" }} dangerouslySetInnerHTML={{__html:highlighted}}/>;
    } catch(e){}
  }
  return <pre className="mono" style={{ margin:0, fontSize:12, lineHeight:1.6, overflow:"auto", whiteSpace:"pre-wrap", wordBreak:"break-word", color:"var(--text-primary)" }}>{code}</pre>;
}

function PolicyScreen({ policy, setPolicy, tokens }) {
  const [forbidden, setForbidden] = useState(policy.forbiddenModels.join(", "));
  const [allowed, setAllowed] = useState(policy.allowedProviders.join(", "));
  const [showPreview, setShowPreview] = useState(false);

  const preview = useMemo(()=> {
    const f = forbidden.split(",").map(s=>s.trim()).filter(Boolean);
    const a = allowed.split(",").map(s=>s.trim()).filter(Boolean);
    const blocked = tokens.filter(t=> {
      const providerHit = a.length>0 && !a.includes(t.provider);
      const modelHit = f.some(pat=> {
        const re = new RegExp("^" + pat.replace(/\*/g,".*") + "$");
        return re.test(t.model||"");
      });
      return providerHit || modelHit;
    });
    return { blocked, forbidden:f, allowed:a };
  }, [forbidden, allowed, tokens]);

  const save = () => {
    setPolicy({ forbiddenModels: preview.forbidden, allowedProviders: preview.allowed });
    setShowPreview(false);
  };

  return (
    <div className="anim-fade" style={{ padding:24, maxWidth:800, margin:"0 auto", display:"flex", flexDirection:"column", gap:16 }}>
      <div>
        <h1 style={{ margin:0, fontSize:22, fontWeight:800 }}>Policy</h1>
        <p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:13 }}>Fleet-wide gates applied after token verification.</p>
      </div>

      <Card>
        <Field label="Forbidden models (glob, comma-separated)">
          <textarea value={forbidden} onChange={e=>setForbidden(e.target.value)} rows={3} style={{ ...inputStyle, width:"100%", resize:"vertical" }} placeholder="e.g. gemini-3-pro-preview, gpt-4*"/>
        </Field>
        <div style={{ marginTop:8, fontSize:12, color:"var(--text-muted)" }}>Only * is special. Everything else is literal.</div>
      </Card>

      <Card>
        <Field label="Allowed providers (comma-separated)">
          <textarea value={allowed} onChange={e=>setAllowed(e.target.value)} rows={2} style={{ ...inputStyle, width:"100%", resize:"vertical" }} placeholder="e.g. openai, anthropic, google"/>
        </Field>
        <div style={{ marginTop:8, fontSize:12, color:"var(--text-muted)" }}>Leave empty to allow all providers.</div>
      </Card>

      <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
        <Button variant="ghost" onClick={()=>{ setForbidden(policy.forbiddenModels.join(", ")); setAllowed(policy.allowedProviders.join(", ")); }}>Reset</Button>
        <Button variant="primary" onClick={()=>setShowPreview(true)}>Preview changes</Button>
      </div>

      {showPreview && (
        <Modal title="Policy Diff Preview" onClose={()=>setShowPreview(false)} footer={[
          <Button key="c" variant="ghost" onClick={()=>setShowPreview(false)}>Cancel</Button>,
          <Button key="s" variant="primary" onClick={save}>Save policy</Button>
        ]}>
          {preview.blocked.length===0 ? (
            <p style={{ margin:0, color:"var(--text-muted)", fontSize:14 }}>No active tokens would be blocked by this policy.</p>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ color:"var(--danger)", fontWeight:700, fontSize:14 }}>
                <Icon name="alertTriangle" size={16}/> Saving this policy will block {preview.blocked.length} active tokens.
              </div>
              <div style={{ maxHeight:300, overflow:"auto", border:"1px solid var(--border-subtle)", borderRadius:"var(--radius-sm)" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid var(--border-subtle)", textAlign:"left", fontSize:11, textTransform:"uppercase", color:"var(--text-muted)" }}>
                      <th style={{ padding:"8px 12px" }}>Token</th>
                      <th style={{ padding:"8px 12px" }}>Reason</th>
                    </tr>
                  </thead>
                  <tbody>
                    {preview.blocked.map(t=> {
                      const providerHit = preview.allowed.length>0 && !preview.allowed.includes(t.provider);
                      const modelHit = preview.forbidden.some(pat=> {
                        const re = new RegExp("^" + pat.replace(/\*/g,".*") + "$");
                        return re.test(t.model||"");
                      });
                      return (
                        <tr key={t.id} style={{ borderBottom:"1px solid var(--border-subtle)" }}>
                          <td style={{ padding:"8px 12px", fontWeight:600 }}>{t.label}</td>
                          <td style={{ padding:"8px 12px", color:"var(--text-secondary)" }}>
                            {providerHit && <span>provider_forbidden </span>}
                            {modelHit && <span>model_forbidden</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

function ShadowAIScreen({ audit }) {
  const [scanning, setScanning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);

  const startScan = () => {
    setScanning(true); setProgress(0); setDone(false);
    let p = 0;
    const iv = setInterval(()=>{
      p += rand(3,12);
      if (p>=100) { p=100; clearInterval(iv); setDone(true); }
      setProgress(p);
    }, 200);
  };

  const denied = audit.filter(a=>a.status!=="ok").slice(0,8);
  const piiFindings = audit.filter(a=>a.status==="egress_blocked");

  return (
    <div className="anim-fade" style={{ padding:24, maxWidth:800, margin:"0 auto", display:"flex", flexDirection:"column", gap:16 }}>
      <div>
        <h1 style={{ margin:0, fontSize:22, fontWeight:800 }}>Shadow AI</h1>
        <p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:13 }}>Scan for unauthorized model usage, policy drift, and secrets on the wire.</p>
      </div>

      <Card style={{ textAlign:"center", padding:40 }}>
        {!scanning && !done && (
          <>
            <div style={{ width:56, height:56, borderRadius:999, background:"var(--bg-elevated)", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"var(--accent)", marginBottom:16 }}>
              <Icon name="eye" size={28}/>
            </div>
            <h3 style={{ margin:"0 0 8px", fontSize:16 }}>Ready to scan</h3>
            <p style={{ margin:"0 0 20px", color:"var(--text-muted)", fontSize:13 }}>Analyze recent audit events for anomalies.</p>
            <Button variant="primary" icon={<Icon name="activity" size={14}/>} onClick={startScan}>Start scan</Button>
          </>
        )}
        {scanning && !done && (
          <>
            <div style={{ width:56, height:56, borderRadius:999, background:"var(--bg-elevated)", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"var(--accent)", marginBottom:16, animation:"pulse 1.5s infinite" }}>
              <Icon name="cpu" size={28}/>
            </div>
            <h3 style={{ margin:"0 0 8px", fontSize:16 }}>Scanning…</h3>
            <div style={{ maxWidth:280, margin:"0 auto" }}>
              <Progress value={progress} max={100} color="var(--accent)"/>
              <div className="mono" style={{ marginTop:8, fontSize:12, color:"var(--text-muted)" }}>{progress}%</div>
            </div>
          </>
        )}
        {done && (
          <>
            <div style={{ width:56, height:56, borderRadius:999, background:"rgba(96,245,138,0.12)", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"var(--success)", marginBottom:16 }}>
              <Icon name="check" size={28}/>
            </div>
            <h3 style={{ margin:"0 0 8px", fontSize:16 }}>Scan complete</h3>
            <p style={{ margin:"0 0 20px", color:"var(--text-muted)", fontSize:13 }}>Found {denied.length} policy events and {piiFindings.length} secret-leak events in the last 30 days.</p>
            <Button variant="ghost" onClick={()=>{setScanning(false);setDone(false);}}>Dismiss</Button>
          </>
        )}
      </Card>

      {piiFindings.length>0 && (
        <Card style={{ borderColor:"var(--danger)", background:"rgba(225,78,78,0.06)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <Icon name="alertTriangle" size={16}/>
            <h4 style={{ margin:0, fontSize:13, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--danger)" }}>Critical Finding — Secret Leak</h4>
          </div>
          {piiFindings.map(f=>(
            <div key={f.id} style={{ display:"flex", flexDirection:"column", gap:6, padding:12, background:"var(--bg-ink)", borderRadius:"var(--radius-sm)", border:"1px solid var(--border-subtle)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
                <span className="mono" style={{ color:"var(--text-primary)", fontWeight:600 }}>{f.tokenLabel}</span>
                <span style={{ color:"var(--text-muted)" }}>{fmtDate(f.timestamp)}</span>
              </div>
              <div style={{ fontSize:13, color:"var(--text-primary)", lineHeight:1.5 }}>
                Prompt contained a suspected API key. Request was blocked before reaching the provider.
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <TagPill label="team" value={f.tags?.team}/>
                <TagPill label="project" value={f.tags?.project}/>
                <TagPill label="env" value={f.tags?.env}/>
                <StatusBadge status={f.status}/>
              </div>
            </div>
          ))}
        </Card>
      )}

      {denied.length>0 && (
        <Card>
          <h4 style={{ margin:"0 0 12px", fontSize:13, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--text-secondary)" }}>Recent denials</h4>
          <AuditTable rows={denied} compact/>
        </Card>
      )}
    </div>
  );
}

/* ================================================================
   FORECAST SCREEN
   ================================================================ */

function ForecastScreen({ tokens, audit }) {
  const active = tokens.filter(t=>!t.revoked);

  const tokenForecasts = useMemo(()=> {
    return active.map(t=> {
      const f = forecastCapHit(t);
      return { token:t, ...f };
    }).filter(x=>x.daysLeft!==null).sort((a,b)=>a.daysLeft-b.daysLeft);
  }, [active]);

  const teamBurn = useMemo(()=> {
    const byTeam = {};
    for (const a of audit) {
      if (a.status !== "ok") continue;
      const team = a.tags?.team || "untagged";
      byTeam[team] = (byTeam[team]||0) + a.cost;
    }
    return Object.entries(byTeam).map(([name,spend])=> {
      const teamTokens = active.filter(t=>t.tags?.team===name);
      const totalCap = teamTokens.reduce((s,t)=>s+t.capUsd,0);
      const totalSpend = teamTokens.reduce((s,t)=>s+t.spendUsd,0);
      const ageDays = Math.max(...teamTokens.map(t=>(PINNED_NOW - t.createdAt)/DAY), 0.1);
      const daily = totalSpend / ageDays;
      const daysLeft = totalCap > 0 ? (totalCap - totalSpend) / Math.max(daily, 0.01) : Infinity;
      return { name, spend:+spend.toFixed(2), cap:+totalCap.toFixed(2), daily:+daily.toFixed(2), daysLeft: Math.floor(daysLeft) };
    }).sort((a,b)=>a.daysLeft-b.daysLeft);
  }, [audit, active]);

  const riskColor = (days) => days<7?"var(--danger)":days<14?"var(--accent-amber)":"var(--success)";

  return (
    <div className="anim-fade" style={{ padding:24, maxWidth:1200, margin:"0 auto", display:"flex", flexDirection:"column", gap:24 }}>
      <div>
        <h1 style={{ margin:0, fontSize:22, fontWeight:800 }}>Forecast</h1>
        <p style={{ margin:"4px 0 0", color:"var(--text-muted)", fontSize:13 }}>Burn report — who runs out first.</p>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px,1fr))", gap:12 }}>
        <Card>
          <h4 style={{ margin:"0 0 12px", fontSize:13, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--text-secondary)" }}>Tokens at risk</h4>
          {tokenForecasts.length===0 ? (
            <p style={{ margin:0, color:"var(--text-muted)", fontSize:13 }}>No active tokens.</p>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {tokenForecasts.slice(0,8).map(f=> (
                <div key={f.token.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:8, height:8, borderRadius:999, background:riskColor(f.daysLeft) }}/>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:12 }}>
                      <span className="mono" style={{ color:"var(--text-primary)", fontWeight:600 }}>{f.token.label}</span>
                      <span style={{ color:riskColor(f.daysLeft), fontWeight:700 }}>{f.daysLeft}d</span>
                    </div>
                    <Progress value={f.token.spendUsd} max={f.token.capUsd} color={riskColor(f.daysLeft)}/>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginTop:2, color:"var(--text-muted)" }}>
                      <span>{fmtUsd(f.token.spendUsd)} / {fmtUsd(f.token.capUsd)}</span>
                      <span>{f.daily}/day</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>

        <Card>
          <h4 style={{ margin:"0 0 12px", fontSize:13, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--text-secondary)" }}>Team burn leaderboard</h4>
          {teamBurn.length===0 ? (
            <p style={{ margin:0, color:"var(--text-muted)", fontSize:13 }}>No spend recorded.</p>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {teamBurn.map(t=> (
                <div key={t.name}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                    <span style={{ color:"var(--text-primary)", fontWeight:600 }}>{t.name}</span>
                    <span style={{ color:riskColor(t.daysLeft), fontWeight:700 }}>{t.daysLeft===Infinity?"∞":t.daysLeft+"d"}</span>
                  </div>
                  <Progress value={t.spend} max={t.cap||1} color={riskColor(t.daysLeft)}/>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginTop:2, color:"var(--text-muted)" }}>
                    <span>{fmtUsd(t.spend)} / {fmtUsd(t.cap)}</span>
                    <span>{t.daily}/day</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ================================================================
   APP SHELL
   ================================================================ */

const NAV = [
  { id:"dashboard", label:"Dashboard", icon:"home" },
  { id:"tokens", label:"Tokens", icon:"key" },
  { id:"audit", label:"Audit", icon:"fileText" },
  { id:"forecast", label:"Forecast", icon:"barChart" },
  { id:"policy", label:"Policy", icon:"shield" },
  { id:"shadow", label:"Shadow AI", icon:"eye" },
];

function App() {
  const [screen, setScreen] = useState("dashboard");
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [accent, setAccent] = useAccent();

  const saved = loadState();
  const initialPersona = saved?.tweaks?.persona || "sre";
  const seeded = seedData(initialPersona);

  const [tokens, setTokens] = useState(saved?.tokens || seeded.tokens);
  const [audit, setAudit] = useState(saved?.audit || seeded.audit);
  const [policy, setPolicy] = useState(saved?.policy || seeded.policy);
  const [tweaks, setTweaks] = useState(saved?.tweaks || { persona:initialPersona, scenario:"healthy", accent:"lime", density:"comfortable" });

  useEffect(()=>{
    setAccent(tweaks.accent);
  }, [tweaks.accent, setAccent]);

  useEffect(()=>{
    saveState({ tokens, audit, policy, tweaks });
  }, [tokens, audit, policy, tweaks]);

  const reseed = (persona) => {
    const s = seedData(persona);
    setTokens(s.tokens);
    setAudit(s.audit);
    setPolicy(s.policy);
  };

  return (
    <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
      {/* Left rail */}
      <aside style={{ width:220, background:"var(--bg-paper)", borderRight:"1px solid var(--border-subtle)", display:"flex", flexDirection:"column", flexShrink:0 }}>
        <div style={{ padding:"18px 20px", display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:8, background:"var(--accent)", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--bg-ink)" }}>
            <Icon name="lock" size={16}/>
          </div>
          <span style={{ fontWeight:800, fontSize:15, letterSpacing:"-0.01em" }}>Keybroker</span>
        </div>
        <nav style={{ flex:1, padding:"8px 12px", display:"flex", flexDirection:"column", gap:2 }}>
          {NAV.map(n=> {
            const active = screen===n.id;
            return (
              <button key={n.id} onClick={()=>setScreen(n.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", borderRadius:"var(--radius-sm)", border:"none", background:active?"var(--bg-elevated)":"transparent", color:active?"var(--text-primary)":"var(--text-secondary)", fontSize:13, fontWeight:600, cursor:"pointer", textAlign:"left", fontFamily:"inherit", transition:"all .15s", borderLeft:active?"3px solid var(--accent)":"3px solid transparent" }}>
                <Icon name={n.icon} size={16}/>
                {n.label}
              </button>
            );
          })}
        </nav>
        <div style={{ padding:12, borderTop:"1px solid var(--border-subtle)" }}>
          <button onClick={()=>setTweaksOpen(true)} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", padding:"8px 10px", borderRadius:"var(--radius-sm)", border:"none", background:"transparent", color:"var(--text-secondary)", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
            <Icon name="settings" size={14}/> Tweaks
          </button>
        </div>
      </aside>

      {/* Main */}
      <main style={{ flex:1, overflow:"auto", background:"var(--bg-ink)" }}>
        {screen==="dashboard" && <Dashboard tokens={tokens} audit={audit} tweaks={tweaks}/>}
        {screen==="tokens" && <TokensScreen tokens={tokens} setTokens={setTokens} audit={audit} setAudit={setAudit}/>}
        {screen==="audit" && <AuditScreen audit={audit} tokens={tokens}/>}
        {screen==="forecast" && <ForecastScreen tokens={tokens} audit={audit}/>}
        {screen==="policy" && <PolicyScreen policy={policy} setPolicy={setPolicy} tokens={tokens}/>}
        {screen==="shadow" && <ShadowAIScreen audit={audit}/>}
      </main>

      <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} tweaks={tweaks} setTweaks={setTweaks} onReseed={reseed}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
