# nginx in front of keybroker — TLS termination + auth.
#
# The broker binds loopback-only by design (single-tenant appliance).
# If you want remote access, do NOT just flip the bind address — put
# something authenticated in front of it. This file is the smallest
# thing that works.
#
# Two auth shapes shown:
#   (A) HTTP basic auth — fine for a 2-3 person team behind WireGuard.
#       Generate the htpasswd file with:
#           sudo htpasswd -B -c /etc/nginx/keybroker.htpasswd you@team
#       (-B = bcrypt; don't use the default MD5.)
#   (B) mTLS client certs — issued one-per-developer; revocation is real.
#       Bring your own CA; this snippet just turns on verification.
#
# Pick one. Both is paranoid but valid for high-blast-radius keys.
#
# IMPORTANT: keybroker's own per-token brk_ JWT is enforced INSIDE the
# proxy, so even if nginx auth is bypassed the request still needs a
# valid brk_ token. But the /admin/* surface (management JWT) and the
# /ui static bundle ARE reachable without a brk_ token — that's exactly
# what this front-end is protecting.

server {
    listen 443 ssl http2;
    server_name keybroker.your-domain.example;

    # ---- TLS ----
    ssl_certificate     /etc/letsencrypt/live/keybroker.your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keybroker.your-domain.example/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- (A) Basic auth — uncomment to enable ----
    # auth_basic           "keybroker";
    # auth_basic_user_file /etc/nginx/keybroker.htpasswd;

    # ---- (B) mTLS — uncomment to enable ----
    # ssl_client_certificate /etc/nginx/keybroker-ca.crt;
    # ssl_verify_client      on;
    # ssl_verify_depth       2;

    # Reasonable upload ceiling — LLM prompts get big; 25 MB covers
    # vision payloads with headroom. Adjust if you proxy embeddings.
    client_max_body_size 25m;

    # Streaming responses — disable buffering so SSE / chunked replies
    # don't pile up in nginx waiting for the connection to close.
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass         http://127.0.0.1:7843;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Pass the brk_ bearer token through unchanged — keybroker
        # verifies it server-side.
        proxy_set_header   Authorization     $http_authorization;
    }
}

# Redirect plaintext → TLS. If you're behind a WireGuard mesh and don't
# care, delete this server block.
server {
    listen 80;
    server_name keybroker.your-domain.example;
    return 301 https://$host$request_uri;
}
