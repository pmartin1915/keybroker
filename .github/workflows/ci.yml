name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # keytar links against libsecret on Linux. The prebuilt binary is fine,
      # but it dlopens libsecret-1.so at import time, so the library must be
      # present even though tests use the FileKeychain backend (no actual
      # OS keyring writes happen).
      - name: Install libsecret on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
